name: Build Alexandria Android

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Download network
        run: |
          curl -sL https://github.com/PGG106/Alexandria-networks/releases/latest/download/nn.net -o nn.net

      - name: Patch Makefile for cross-compile
        run: |
          sed -i 's/-march=native -E -dM -/-E -dM -/' makefile

      - name: Patch nnue.h for constexpr round
        run: |
          sed -i '/#pragma once/a \\nconstexpr double constexpr_round(double x) { return x >= 0.0 ? (double)(long long)(x + 0.5) : (double)(long long)(x - 0.5); }' src/nnue.h
          sed -i 's/std::round(/constexpr_round(/g' src/nnue.h

      - name: Build host preprocess tool
        run: |
          cd tools
          g++ -funroll-loops -O3 -fno-exceptions -std=c++2b -DNDEBUG -o preprocess preprocess.cpp -pthread
          cd ..

      - name: Preprocess network
        run: |
          ./tools/preprocess nn.net processed.net

      - name: Build Alexandria (ARM64)
        run: |
          make build=arm64 \
               CXX=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android28-clang++ \
               NATIVE="-march=armv8-a" \
               CXXFLAGS="-funroll-loops -O3 -fno-exceptions -std=c++2b -DNDEBUG -DEVALFILE=\\\"processed.net\\\" --target=aarch64-linux-android28" \
               Alexandria

      - name: List build output
        run: |
          find . -maxdepth 1 -type f -executable

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alexandria-android-arm64
          path: Alexandria

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-build-${{ github.run_number }}
          name: Alexandria Android Build ${{ github.run_number }}
          prerelease: true
          files: Alexandria
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
