name: Build Alexandria Android

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip -q android-ndk-r26d-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r26d" >> $GITHUB_ENV

      - name: Patch Makefile for cross-compile
        run: |
          sed -i 's/-march=native -E -dM -/-E -dM -/' makefile

      - name: Build
        run: |
          make build=arm64 \
               CXX=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android28-clang++ \
               NATIVE="-march=armv8-a" \
               CXXFLAGS="-funroll-loops -O3 -fno-exceptions -std=c++23 -DNDEBUG --target=aarch64-linux-android28"

      - name: List build output
        run: |
          find . -maxdepth 1 -type f -executable

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: alexandria-android-arm64
          path: Alexandria

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-build-${{ github.run_number }}
          name: Alexandria Android Build ${{ github.run_number }}
          prerelease: true
          files: Alexandria
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
